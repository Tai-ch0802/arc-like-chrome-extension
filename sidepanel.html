<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title></title>
    <link rel="stylesheet" href="sidepanel.css">
</head>

<body>
    <!-- Workspace bar: a single button showing the active workspace name; clicking
         opens the manage dialog (switch / rename / delete / create). Label + aria
         resolved at runtime by workspaceUI.initWorkspaceUI(). -->
    <div id="workspace-row" class="workspace-row">
        <button id="workspace-switch-btn" class="workspace-switch-btn">
            <span class="workspace-switch-label"></span>
            <!-- 開啟管理 dialog 的視覺暗示(ISSUE-162 WP6):純名稱按鈕看不出可點開 -->
            <span class="workspace-switch-chevron" data-icon="expand_more" data-icon-size="16" aria-hidden="true"></span>
        </button>
        <!-- Drive-sync status indicator. Hidden until a status arrives; updated
             live via the driveSyncStatusChanged event (see modules/ui/driveSyncBadge.js). -->
        <span id="drive-sync-badge" class="drive-sync-badge" hidden aria-hidden="true"></span>
    </div>

    <div id="search-container">
        <div class="search-top-row">
            <div class="search-input-wrapper">
                <input type="text" id="search-box" placeholder="">
                <button id="clear-search-btn" class="hidden" title="Clear search" aria-label="Clear search" data-icon="close"></button>
            </div>
            <button id="settings-toggle" title="Settings" aria-label="Settings" data-icon="settings"></button>
        </div>
        <div id="search-result-count" class="hidden" aria-live="polite"></div>
    </div>

    <div id="no-search-results" class="hidden" aria-live="polite">
        <div class="no-results-icon"></div>
        <div class="no-results-text" data-i18n="searchNoResults"></div>
        <button id="clear-search-cta" class="empty-state-action-btn">
            <span data-i18n="clearSearchAriaLabel"></span>
        </button>
    </div>

    <div id="content-container">
        <!-- BASE-015:每個區塊包進 .panel-section wrapper(data-section-id 為排序身分),
             modules/ui/sectionOrderUI.js 依 storage.sync.sectionOrder 重排 wrapper。
             內部元素 id 一律不變(E2E selector 與各 renderer 依賴)。 -->
        <section id="tabs-section" class="panel-section" data-section-id="tabs">
            <!-- Tab Section Header -->
            <div class="section-header-row">
                <h2 class="section-header" data-i18n="tabsHeader">Tabs</h2>
                <div class="header-controls-right">
                    <div id="ai-download-progress" class="ai-progress" hidden>
                        <div class="ai-progress__fill"></div>
                    </div>
                    <button id="ai-group-btn" class="header-action-btn" title="Smart Auto-Grouping"
                        data-i18n-title="smartGroupingBtnTitle" aria-label="Smart Auto-Grouping"><span
                            class="btn-icon" data-icon="auto_awesome"></span><span class="btn-label"
                            data-i18n="smartGroupingBtnText"></span></button>
                    <button id="ai-cleanup-btn" class="header-action-btn" title="AI Cleanup"
                        data-i18n-title="aiCleanupBtnTitle" aria-label="AI Cleanup"><span class="btn-icon"
                            data-icon="cleaning_services"></span><span class="btn-label"
                            data-i18n="aiCleanupBtnText"></span></button>
                    <button id="page-reader-btn" class="header-action-btn" title="Page Reader"
                        data-i18n-title="pageReaderBtnTitle" aria-label="Page Reader"><span class="btn-icon"
                            data-icon="description"></span><span class="btn-label"
                            data-i18n="pageReaderBtnText"></span></button>
                </div>
            </div>

            <!-- AI Cleanup Section (collapsed by default; expanded when the button is clicked) -->
            <div id="ai-cleanup-section" class="ai-cleanup-section hidden" aria-live="polite">
                <div class="ai-cleanup-header">
                    <h3 class="ai-cleanup-title" data-i18n="aiCleanupSectionHeader">AI Cleanup Suggestions</h3>
                    <button id="ai-cleanup-close" class="icon-btn" aria-label="Close" data-icon="close"></button>
                </div>
                <div id="ai-cleanup-status" class="ai-cleanup-status"></div>
                <div id="ai-cleanup-list" class="ai-cleanup-list"></div>
                <div class="ai-cleanup-footer hidden">
                    <label class="ai-cleanup-select-all">
                        <input type="checkbox" id="ai-cleanup-select-all">
                        <span data-i18n="aiCleanupSelectAll">Select all</span>
                    </label>
                    <button id="ai-cleanup-confirm" class="ai-cleanup-confirm-btn"
                        data-i18n="aiCleanupConfirm">Close selected</button>
                </div>
            </div>

            <div id="tab-list"></div>

            <hr class="divider">
        </section>

        <section id="other-windows-section" class="panel-section" data-section-id="otherWindows">
            <div id="other-windows-list"></div>

            <hr class="divider">
        </section>

        <!-- Reading List Section -->
        <div id="reading-list-section" class="panel-section" data-section-id="readingList">
            <div class="section-header-row">
                <button id="reading-list-toggle" class="section-toggle-btn" aria-expanded="true"
                    aria-controls="reading-list">
                    <h2 class="section-header" data-i18n="readingListHeader"></h2>
                    <span class="toggle-chevron"></span>
                </button>
                <div class="header-controls-right">
                    <select id="reading-list-sort" class="header-select" title="Sort by" data-i18n-title="sortByTitle">
                        <option value="date-newest" data-i18n="sortByDateNewest"></option>
                        <option value="date-oldest" data-i18n="sortByDateOldest"></option>
                        <option value="title" data-i18n="sortByTitle"></option>
                    </select>
                    <button id="clear-all-read-btn" class="header-action-btn hidden" data-action="clear-all-read"
                        data-i18n="clearAllRead"></button>
                </div>
            </div>
            <div id="reading-list"></div>
            <hr class="divider">
        </div>

        <section id="bookmarks-section" class="panel-section" data-section-id="bookmarks">
            <div class="section-header-row">
                <h2 class="section-header" data-i18n="bookmarksHeader"></h2>
                <div class="header-controls-right">
                    <button id="bookmark-tools-btn" class="header-action-btn"
                        title="" data-i18n-title="bmToolsTitle" data-icon="build"></button>
                </div>
            </div>
            <div id="bookmark-list"></div>
            <!-- BASE-015:補結尾 divider 讓重排後區塊間分隔一致;最後一個區塊的 divider 由 CSS 隱藏 -->
            <hr class="divider">
        </section>

        <!-- Newswire Section (BASE-016 N1):內容由 modules/ui/newswireRenderer.js
             經 SW 的 newswire:getState 回填,即時事件走 runtime message 廣播。 -->
        <section id="newswire-section" class="panel-section" data-section-id="newswire">
            <div class="section-header-row">
                <button id="newswire-toggle" class="section-toggle-btn" aria-expanded="true"
                    aria-controls="newswire-list">
                    <h2 class="section-header" data-i18n="newswireSectionHeader"></h2>
                    <span id="newswire-unread-badge" class="newswire-unread-badge hidden"
                        data-i18n-title="newswireUnreadBadgeTitle" aria-live="polite"></span>
                    <span class="toggle-chevron"></span>
                </button>
                <div class="header-controls-right">
                    <button id="newswire-pause-btn" class="header-action-btn newswire-header-btn hidden"
                        data-i18n="newswirePauseBtn" data-i18n-title="newswirePauseBtn"></button>
                    <button id="newswire-mark-read-btn" class="header-action-btn newswire-header-btn hidden"
                        data-i18n="newswireMarkReadBtn" data-i18n-title="newswireMarkReadBtn"></button>
                </div>
            </div>
            <div id="newswire-top-sentinel" aria-hidden="true"></div>
            <div id="newswire-list"></div>
            <div id="newswire-empty" class="newswire-empty hidden">
                <div class="newswire-empty-text" data-i18n="newswireEmptyState"></div>
                <button id="newswire-empty-cta" class="empty-state-action-btn">
                    <span data-i18n="newswireEmptyStateCta"></span>
                </button>
            </div>
            <hr class="divider">
        </section>
    </div>

    <!-- Toast Notification for Undo -->
    <div id="toast-container" class="hidden" aria-live="polite">
        <span id="toast-message"></span>
        <button id="toast-undo-btn" class="hidden" title="Undo" data-i18n-title="toastUndoBtn"
            data-i18n="toastUndoBtn">復原 (Undo)</button>
        <button id="toast-close-btn" title="Close" data-i18n-title="toastCloseBtn" aria-label="Close" data-icon="close"></button>
    </div>

    <script src="lib/Sortable.min.js" defer></script>
    <script type="module" src="sidepanel.js"></script>
</body>

</html>
